<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload | Audio Forensic Toolkit</title>
    <style>
        :root {
            --bg-dark: #070B19;
            --surface: #111827;
            --surface-light: #1F2937;
            --accent-blue: #3B82F6;
            --accent-cyan: #06B6D4;
            --text-main: #9CA3AF;
            --text-light: #F3F4F6;
            --danger: #EF4444;
            --success: #10B981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation (Matches Home Page) */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: rgba(17, 24, 39, 0.9);
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-light);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span { color: var(--accent-cyan); }

        .back-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--accent-cyan); }

        /* Main Upload Section */
        .upload-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .upload-card {
            background-color: var(--surface);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 50px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .upload-card h2 {
            color: var(--text-light);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .upload-card p {
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* The Dropzone Area */
        .dropzone {
            border: 2px dashed rgba(6, 182, 212, 0.4);
            border-radius: 12px;
            padding: 60px 20px;
            background-color: rgba(31, 41, 55, 0.5);
            transition: all 0.3s ease;
            position: relative;
        }

        .dropzone.active, .dropzone:hover {
            border-color: var(--accent-cyan);
            background-color: rgba(6, 182, 212, 0.05);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            fill: none;
            stroke: var(--accent-blue);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Hidden file input */
        #audioFile { display: none; }

        .browse-btn {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-block;
            margin-top: 15px;
        }

        .browse-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-dark);
        }

        /* Modern File Display Widget (Hidden by default) */
        .file-display {
            display: none;
            background-color: var(--surface-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px 20px;
            margin-top: 30px;
            text-align: left;
            align-items: center;
            justify-content: space-between;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-icon {
            width: 32px;
            height: 32px;
            stroke: var(--success);
            fill: none;
        }

        .file-details h4 {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 2px;
            word-break: break-all;
        }

        .file-details span {
            font-size: 0.8rem;
            color: var(--text-main);
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            transition: color 0.3s;
            padding: 5px;
        }

        .remove-btn:hover { color: var(--danger); }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-light);
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            opacity: 0.5;
            pointer-events: none; /* Disabled until file is uploaded */
        }

        .submit-btn.ready {
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.4);
        }

        .submit-btn.ready:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M17 5v14M22 10v4M7 5v14M2 10v4"/>
            </svg>
            Audio Forensic <span>Toolkit</span>
        </a>
        <a href="index.html" class="back-link">&larr; Back to Dashboard</a>
    </nav>

    <div class="upload-wrapper">
        <div class="upload-card">
            <h2>Initiate Trust Audit</h2>
            <p>Upload a suspicious audio file for deep forensic analysis.</p>

            <form action="/analyze" method="POST" enctype="multipart/form-data">
                
                <div class="dropzone" id="dropzoneContainer">
                    <svg class="upload-icon" viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </svg>
                    <div id="uploadText">
                        <h3>Drag & drop your audio file</h3>
                        <p style="margin-top: 5px; font-size: 0.85rem;">WAV, MP3, FLAC (Max 50MB)</p>
                    </div>
                    <input type="file" id="audioFile" name="audio_evidence" accept="audio/*">
                    <label for="audioFile" class="browse-btn" id="browseLabel">Browse Files</label>
                </div>

                <div class="file-display" id="fileDisplay">
                    <div class="file-info">
                        <svg class="file-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                        <div class="file-details">
                            <h4 id="fileName">evidence_recording.wav</h4>
                            <span id="fileSize">2.4 MB</span>
                        </div>
                    </div>
                    <button type="button" class="remove-btn" id="removeBtn" aria-label="Remove file">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Run Forensic Audit</button>
            </form>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('audioFile');
        const dropzoneContainer = document.getElementById('dropzoneContainer');
        const fileDisplay = document.getElementById('fileDisplay');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const removeBtn = document.getElementById('removeBtn');
        const submitBtn = document.getElementById('submitBtn');

        // Handle file selection
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                const file = this.files[0];
                
                // Format file size
                const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
                
                // Update UI text
                fileName.textContent = file.name;
                fileSize.textContent = sizeInMB + ' MB';
                
                // Toggle visibility
                dropzoneContainer.style.display = 'none';
                fileDisplay.style.display = 'flex';
                
                // Enable the submit button
                submitBtn.classList.add('ready');
                submitBtn.textContent = 'Run Forensic Audit ->';
            }
        });

        // Handle file removal
        removeBtn.addEventListener('click', function() {
            // Clear the file input
            fileInput.value = '';
            
            // Reset visibility
            fileDisplay.style.display = 'none';
            dropzoneContainer.style.display = 'block';
            
            // Disable submit button
            submitBtn.classList.remove('ready');
            submitBtn.textContent = 'Run Forensic Audit';
        });
    </script>
</body>
</html>
